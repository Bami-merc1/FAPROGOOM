<div class="row g-4" id="product-list">
    </div>

<script>
async function fetchProducts() {
    try {
        const response = await fetch('get_products.php');
        const products = await response.json();
        const list = document.getElementById('product-list');

        list.innerHTML = products.map(p => `
            <div class="col-md-4">
                <div class="card product-card h-100 p-3 text-center">
                    <i class="fas ${p.image_icon} fa-3x mb-3 text-info"></i>
                    <h4 class="fw-bold">${p.name}</h4>
                    <p class="text-muted small">${p.description}</p>
                    <p class="fw-bold text-success">₦${parseFloat(p.price).toLocaleString()}</p>
                    <button class="btn bg-kings-green text-white fw-bold mt-auto">Add to Cart</button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        document.getElementById('product-list').innerHTML = "<p class='text-white'>Error connecting to server.</p>";
    }
}
fetchProducts();
</script>
