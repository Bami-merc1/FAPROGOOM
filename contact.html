<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAPROGOOM | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --k-green: #008000; --k-lime: #ccff33; }
        .bg-kings-green { background-color: var(--k-green) !important; }
        .text-kings-lime { color: var(--k-lime) !important; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/images/backgroung image.jpeg');
            background-size: cover; background-attachment: fixed; min-height: 100vh;
        }
        .nav-link { color: white !important; font-weight: 600; }
        .contact-form { background: rgba(255,255,255,0.95); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Full-screen Hero Landing Page Style */
        .hero-landing {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('images/homepage.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 90vh;
            display: flex;
            align-items: center;
            color: white;
        }

        .btn-kings-lime {
            background-color: var(--kings-lime);
            color: black;
            font-weight: bold;
            border: none;
            padding: 12px 30px;
            transition: all 0.3s;
        }

        .btn-kings-lime:hover {
            background-color: white;
            transform: translateY(-3px);
        }

        .feature-icon {
            font-size: 2.5rem;
            color: var(--kings-green);
            margin-bottom: 1rem;
        }

        .nav-link {
            color: white !important;
            font-weight: 600;
            margin: 0 10px;
        }

        .nav-link:hover {
            color: var(--kings-lime) !important;
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-kings-green sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-white fs-3" href="#">
                <i class="fas fa-tractor text-kings-lime"></i> FAPROGOOM
            </a>
            <button class="navbar-toggler border-white text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="logistics.html">Logistics</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item ms-lg-3">
                        <div class="d-flex gap-3">
                            <a href="#" class="text-white"><i class="fas fa-search fs-5"></i></a>
                            <a href="#" class="text-white position-relative">
                                <i class="fas fa-shopping-cart fs-5"></i>
                                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">0</span>
                            </a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="contact-form p-5">
                    <h2 class="text-center fw-bold mb-4" style="color: var(--k-green);">Get In Touch</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control border-success">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control border-success">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Message</label>
                            <textarea class="form-control border-success" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn bg-kings-green text-white w-100 fw-bold py-2">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-kings-lime py-4 text-center">
        <div class="container">
            <p class="mb-0 fw-bold">&copy; 2026 FAPROGOOM - Quality Livestock & Logistics</p>
        </div>
    </footer>

</body>
</html>
